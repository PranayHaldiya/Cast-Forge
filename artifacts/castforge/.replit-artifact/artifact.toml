kind = "web"
previewPath = "/"
title = "CastForge"
version = "1.0.0"
id = "artifacts/castforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22674

[services.development]
run = "pnpm --filter @workspace/castforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/castforge", "run", "build" ]
publicDir = "artifacts/castforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22674"
BASE_PATH = "/"
